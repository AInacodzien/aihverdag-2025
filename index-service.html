<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AIhverdag.no – Vi er snart tilbake. Vi bygger noe fantastisk for deg!">
  <title>Vi er snart tilbake – AIhverdag.no</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b0b0f;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      height: 100vh;
      text-align: center;
    }

    .logo {
      width: 200px;
      max-width: 80%;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 8px rgba(0, 255, 247, 0.4));
    }

    .spinner {
      border: 6px solid rgba(255, 255, 255, 0.1);
      border-top: 6px solid #00fff7; /* Turkusowy kolor */
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1.2s linear infinite;
      margin-bottom: 30px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.5;
      color: #cccccc;
    }
  </style>
</head>
<body>
  <img src="aihverdag-logo.webp" alt="AIhverdag logo" class="logo">
  <div class="spinner"></div>
  <h1>Vi er snart tilbake</h1>
  <p>Vi bygger noe fantastisk for deg. Snart vil du kunne utforske en ny og forbedret versjon av AIhverdag.no.</p>
</body>
</html>
